<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MewChat — chat with mewmew</title>
  <meta name="theme-color" content="#ff79c6" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffb86c" media="(prefers-color-scheme: light)">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="kawaii.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>
        <span class="mascot" id="mascot">🐱</span>
        MewChat <span class="subtitle">| chat with mewmew</span>
      </h1>
      <div class="header-right">
        <select id="session-select">
          <option value="">Loading sessions…</option>
        </select>
        <button id="theme-btn" title="Toggle theme">🌓</button>
      </div>
    </header>

    <div id="chat">
      <div id="chat-messages"></div>
      <div id="typing" class="typing hidden"><span class="typing-dots"><span></span><span></span><span></span></span> mewmew is typing…</div>
      <div class="chat-input-area">
        <textarea id="msg-input" placeholder="Type your message…" rows="1"></textarea>
        <button id="send-btn">Send</button>
      </div>
    </div>

    <div id="error" class="error hidden"></div>
    <footer>Standalone chat • Powered by OpenClaw</footer>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
