<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MewChat — chat with mewmew</title>
  <meta name="theme-color" content="#ff79c6" media="(prefers-color-scheme: dark)">
  <meta name="theme-color" content="#ffb86c" media="(prefers-color-scheme: light)">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="kawaii.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>
        <span class="mascot" id="mascot">🐱</span>
        MewChat <span class="subtitle">| chat with mewmew</span>
      </h1>
      <div class="header-right">
        <select id="session-select" aria-label="Select chat session">
          <option value="">Loading sessions…</option>
        </select>
        <button id="theme-btn" aria-label="Toggle theme" title="Toggle theme">🌓</button>
        <span id="connection-status" class="connection-status" title="Connection status" aria-label="Connection status"></span>
      </div>
    </header>

    <div id="chat">
      <div id="chat-messages" role="log"></div>
      <div id="typing" class="typing hidden"><span class="typing-dots"><span></span><span></span><span></span></span> mewmew is typing…</div>
      <button id="scroll-bottom" class="scroll-bottom hidden" aria-label="Scroll to bottom" title="Scroll to bottom">⬇️</button>
      <div class="chat-input-area">
        <div class="input-wrapper">
          <textarea id="msg-input" placeholder="Type your message… (Ctrl+Enter to send, Esc to clear)" rows="1"></textarea>
          <div id="char-count" class="char-count">0</div>
        </div>
        <button id="send-btn">Send</button>
        <button id="clear-btn" aria-label="Clear chat" title="Clear chat (Esc)">🗑️</button>
      </div>
    </div>

    <div id="error" class="error hidden"></div>
    <footer>Standalone chat • Powered by OpenClaw</footer>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
