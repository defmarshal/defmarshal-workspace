<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>HERE Route Debug</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: sans-serif; }
    #map { width: 100%; height: 60vh; }
    #log { padding: 15px; background: #f0f0f0; height: 40vh; overflow-y: auto; font-family: monospace; font-size: 12px; }
    .log-entry { margin: 2px 0; }
    .error { color: #c00; }
    .success { color: #090; }
    .info { color: #0066cc; }
    #controls { padding: 10px; background: #ddd; }
    button { padding: 8px 16px; margin-right: 10px; }
  </style>
</head>
<body>
  <div id="controls">
    <button onclick="testRest()">Test REST API</button>
    <button onclick="loadRoute()">Load Route (JS SDK)</button>
    <button onclick="clearLog()">Clear Log</button>
  </div>
  <div id="map"></div>
  <div id="log"></div>

  <script src="https://js.api.here.com/v3/3.1/mapsjs-core.js" type="text/javascript" charset="utf-8"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-service.js" type="text/javascript" charset="utf-8"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-ui.js" type="text/javascript" charset="utf-8"></script>
  <script src="https://js.api.here.com/v3/3.1/mapsjs-mapevents.js" type="text/javascript" charset="utf-8"></script>
  <link rel="stylesheet" type="text/css" href="https://js.api.here.com/v3/3.1/mapsjs-ui.css" />

  <script>
    const API_KEY = 'f6RwVdTvm9EEdWS8X-HhVyIQ-JpXenG1W_XJ0jVo-2Y';
    const origin = '-6.451460,106.735359';
    const destination = '-6.241173,106.840765';

    function log(msg, type='info') {
      const div = document.createElement('div');
      div.className = 'log-entry ' + type;
      div.textContent = new Date().toISOString() + ' | ' + msg;
      document.getElementById('log').appendChild(div);
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    // Test 1: Direct REST call to verify route exists
    async function testRest() {
      clearLog();
      log('Testing REST API...', 'info');
      const url = `https://router.hereapi.com/v8/routes?transportMode=scooter&origin=${origin}&destination=${destination}&traffic=enabled&return=polyline,summary,actions&apiKey=${API_KEY}`;
      log('URL: ' + url, 'info');

      try {
        const resp = await fetch(url);
        const data = await resp.json();
        log('HTTP ' + resp.status, resp.status === 200 ? 'success' : 'error');
        if (data.routes && data.routes.length) {
          const route = data.routes[0];
          const section = route.sections[0];
          log('Route found!', 'success');
          log('Sections: ' + route.sections.length, 'info');
          log('Polyline length: ' + (section.polyline ? section.polyline.length : 'MISSING'), section.polyline ? 'success' : 'error');
          log('Duration: ' + (section.summary ? section.summary.duration : 'MISSING'), section.summary ? 'success' : 'error');
        } else {
          log('No routes in response', 'error');
          console.error('Full response:', data);
        }
      } catch (e) {
        log('Fetch error: ' + e.message, 'error');
      }
    }

    // Test 2: JS SDK route loading
    async function loadRoute() {
      clearLog();
      log('Initializing HERE platform...', 'info');
      const platform = new H.service.Platform({ apikey: API_KEY });
      const defaultLayers = platform.createDefaultLayers();

      // Initialize map if not already done
      let map = window.map;
      if (!map) {
        map = new H.Map(
          document.getElementById('map'),
          defaultLayers.vector.normal.map,
          { zoom: 10, center: { lat: -6.35, lng: 106.79 } }
        );
        window.map = map;
        const ui = H.ui.UI.createDefault(map, defaultLayers);
        const mapEvents = new H.mapevents.MapEvents(map);
        new H.mapevents.Behavior(mapEvents);
        log('Map initialized', 'success');
      }

      const router = platform.getRouter({ 'routing': { 'return': 'polyline,summary,actions' } });
      const routeRequest = {
        origin: origin,
        destination: destination,
        transportMode: 'scooter',
        traffic: 'enabled',
        departureTime: 'now'
      };

      log('Requesting route via JS SDK...', 'info');
      try {
        const result = await new Promise((resolve, reject) => {
          router.calculateRoute(routeRequest, resolve, reject);
        });
        log('Response received', 'success');
        log('Routes count: ' + result.routes.length, 'info');

        if (result.routes.length) {
          const route = result.routes[0];
          const section = route.sections[0];
          log('Section count: ' + route.sections.length, 'info');

          if (!section.polyline) {
            log('ERROR: No polyline in section!', 'error');
            console.log('Section object:', section);
            return;
          }

          log('Decoding polyline...', 'info');
          try {
            const line = H.geo.LineString.fromFlexPolyline(section.polyline);
            const polyline = new H.map.Polyline(line, { style: { strokeColor: '#0066cc', lineWidth: 5 } });
            map.addObject(polyline);
            map.getViewModel().setLookAtData({ bounds: polyline.getBoundingBox() });
            log('Polyline added to map', 'success');

            // Add markers
            const [olat, olng] = origin.split(',').map(Number);
            const [dlat, dlng] = destination.split(',').map(Number);
            new H.map.Marker({ lat: olat, lng: olng }, { icon: '📍' }).setData('Origin').addTo(map);
            new H.map.Marker({ lat: dlat, lng: dlng }, { icon: '🏁' }).setData('Destination').addTo(map);
            log('Markers added', 'success');
          } catch (e) {
            log('Polyline decode error: ' + e.message, 'error');
            console.error(e);
          }
        } else {
          log('No routes returned', 'error');
        }
      } catch (error) {
        log('Router error: ' + (error.message || JSON.stringify(error)), 'error');
        console.error(error);
      }
    }

    // Auto-run tests on load
    window.onload = function() {
      log('Page loaded. Click buttons to test.', 'info');
      // Auto-start REST test
      setTimeout(testRest, 1000);
    };
  </script>
</body>
</html>
